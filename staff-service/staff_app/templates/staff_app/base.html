<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Staff Portal{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1a0a, #1a3a2a, #0d2818);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .navbar {
            background: rgba(10, 26, 10, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
        }
        .navbar .brand {
            font-size: 1.5em;
            font-weight: bold;
            color: #4CAF50;
            text-decoration: none;
        }
        .navbar .nav-links { display: flex; gap: 15px; align-items: center; }
        .navbar .nav-links a {
            color: #bbb;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .navbar .nav-links a:hover { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(76, 175, 80, 0.15); }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
        }
        .btn-primary { background: linear-gradient(135deg, #2E7D32, #4CAF50); }
        .btn-primary:hover { background: linear-gradient(135deg, #256b29, #43a047); transform: translateY(-2px); }
        .btn-warning { background: linear-gradient(135deg, #F57F17, #FFB300); }
        .btn-warning:hover { background: linear-gradient(135deg, #e06c10, #eda000); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-success { background: rgba(40, 167, 69, 0.2); border: 1px solid rgba(40, 167, 69, 0.4); color: #7ddf9b; }
        .alert-error { background: rgba(220, 53, 69, 0.2); border: 1px solid rgba(220, 53, 69, 0.4); color: #f5a5ae; }
        h1, h2, h3 { color: #ffffff; }
        .section-title { font-size: 1.3em; margin-bottom: 20px; color: #4CAF50; }
        .price { color: #4CAF50; font-size: 1.1em; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { text-align: center; padding: 25px; }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #4CAF50; }
        .stat-label { color: #888; margin-top: 5px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #bbb; margin-bottom: 6px; font-size: 0.9em; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px 14px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="brand">⚙️ Staff Portal</a>
        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'add_laptop' %}">+ Laptop</a>
            <a href="{% url 'add_mobile' %}">+ Điện thoại</a>
            <a href="{% url 'logout' %}">Đăng xuất ({{ user.username }})</a>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
