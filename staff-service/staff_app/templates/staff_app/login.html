<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1a0a, #1a3a2a, #0d2818);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 35px; }
        .login-header .icon { font-size: 3em; margin-bottom: 15px; display: block; }
        .login-header h1 { color: #4CAF50; font-size: 1.8em; margin-bottom: 8px; }
        .login-header p { color: #888; font-size: 0.9em; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; color: #bbb; margin-bottom: 8px; font-size: 0.9em; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.25);
        }
        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #256b29, #43a047);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.35);
        }
        .register-link { text-align: center; margin-top: 25px; color: #888; font-size: 0.9em; }
        .register-link a { color: #4CAF50; text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
        .alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px;
            background: rgba(220, 53, 69, 0.2); border: 1px solid rgba(220, 53, 69, 0.4); color: #f5a5ae;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="icon">⚙️</span>
            <h1>Staff Login</h1>
            <p>Đăng nhập quản lý sản phẩm</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="register-link">
            Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a>
        </div>
    </div>
</body>
</html>
